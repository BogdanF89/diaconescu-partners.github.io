<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diaconescu Partners — Logo Options</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Trajan+Pro:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    font-family: 'Cormorant Garamond', Georgia, serif;
    padding: 40px 20px;
    min-height: 100vh;
  }
  h1 {
    text-align: center;
    color: #b8975a;
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    margin-bottom: 60px;
    opacity: 0.7;
  }

  .logos-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    max-width: 1000px;
    margin: 0 auto;
  }

  .logo-card {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 1px solid rgba(184,151,90,0.15);
  }

  .logo-variant {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 50px 40px;
    position: relative;
  }
  .logo-variant.dark { background: #0d1b2a; }
  .logo-variant.light { background: #f5f2ec; }
  .logo-variant.white { background: #ffffff; }
  .logo-variant.gold-bg { background: #b8975a; }

  .variant-label {
    position: absolute;
    top: 10px; left: 14px;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.35;
    font-family: 'Cinzel', serif;
  }
  .dark .variant-label { color: #f5f2ec; }
  .light .variant-label, .white .variant-label { color: #0d1b2a; }
  .gold-bg .variant-label { color: #0d1b2a; }

  .card-title {
    background: #0d1b2a;
    border-top: 1px solid rgba(184,151,90,0.15);
    padding: 14px 20px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: #b8975a;
    text-align: center;
    text-transform: uppercase;
  }

  svg { display: block; }

  .logo-halves {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .logo-halves .logo-variant {
    padding: 40px 30px;
  }
  .logo-halves .logo-variant + .logo-variant {
    border-left: 1px solid rgba(184,151,90,0.15);
  }

  @media (max-width: 700px) {
    .logos-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>Diaconescu Partners — Logo Options</h1>

<div class="logos-grid">

  <!-- OPTION 1: Shield + D Monogram (similar to reference) -->
  <div class="logo-card">

      <div class="logo-variant dark">

        <svg width="160" height="130" viewBox="0 0 160 130" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Shield -->

          <text x="80" y="67" text-anchor="middle" font-family="Cinzel, serif" font-size="34" font-weight="700" fill="#f5f2ec" letter-spacing="-1">D</text>
          <!-- DIACONESCU -->
          <text x="80" y="117" text-anchor="middle" font-family="Cinzel, serif" font-size="11.5" font-weight="600" fill="#b8975a" letter-spacing="5">DIACONESCU</text>
          <!-- PARTNERS -->
          <text x="80" y="129" text-anchor="middle" font-family="Cinzel, serif" font-size="7" font-weight="400" fill="rgba(245,242,236,0.55)" letter-spacing="7.5">PARTNERS</text>
        </svg>
      </div>
      <div class="logo-variant white">

          <text x="80" y="120" text-anchor="middle" font-family="Cinzel, serif" font-size="7.5" font-weight="400" fill="#b8975a" letter-spacing="7">PARTNERS</text>
        </svg>
      </div>
    </div>
    <div class="card-title">Option 2 — Scales of Justice</div>
  </div>
